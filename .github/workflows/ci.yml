name: CI

# PR 검증 + main 브랜치 보호용 파이프라인.
# - lint-unit-build: 타입/린트/Vitest/Next 빌드
# - e2e: Playwright(chromium) 로 홈 렌더 smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 최소 권한. checkout 과 artifact 업로드만 필요.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-unit-build:
    name: lint + vitest + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit / contract tests
        run: npm test

      - name: Next.js build
        run: npm run build

  e2e:
    name: playwright e2e (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local for CI
        run: echo "DATABASE_URL=$DATABASE_URL" > .env.local

      - name: Run DB migrations
        run: npm run db:migrate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
